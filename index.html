<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product card</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="card">
      <img
        class="product-image"
        src="https://i.ebayimg.com/images/g/MooAAeSwJSpp5ltx/s-l400.webp"
        alt="Nike Air Max 270"
      />

      <h2 class="product-title">Nike Air Max 270</h2>

      <div class="rating">
        <span class="stars">⭐⭐⭐⭐☆</span>
        <span class="rating-number">4.5</span>
        <span class="review-count">128 reviews</span>
      </div>

      <p class="description">
        The perfect everyday sneaker with maximum comfort and style. Breathable
        mesh upper.
      </p>

      <div class="price-row">
        <span class="price">$129.99</span>
        <span class="small-stars">☆☆☆☆☆</span>
        <button class="add-btn">🛒 Add</button>
      </div>

      <div class="quant">
        <button class="quant-button">-</button>
        <span class="quant-button">1</span>
        <button class="quant-button">+</button>
      </div>
    </div>
  </body>
</html>
